name: Release

on:
  workflow_dispatch:

jobs:
  publish-core:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: true

      - name: Get version
        id: get_version
        run: echo "version=$(grep '^version=' wiremock-core/src/main/resources/version.properties | cut -d= -f2)" >> $GITHUB_OUTPUT

      - name: Publish core package
        id: publish_package
        run: ./gradlew publishAndReleaseToMavenCentral --no-configuration-cache --stacktrace

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ vars.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_TOKEN }}
          OSSRH_GPG_SECRET_KEY: ${{ secrets.OSSRH_GPG_SECRET_KEY }}
          OSSRH_GPG_SECRET_KEY_PASSWORD: ${{ secrets.OSSRH_GPG_SECRET_KEY_PASSWORD }}
          SONATYPE_CLOSE_TIMEOUT_SECONDS: 1800

  trigger-wiremock-org-update:
    needs: publish-core
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Bump WireMock versions
        run: |
          gh workflow run "Bump WireMock Versions" \
            --repo wiremock/wiremock.org \
            -f WIREMOCK_BETA=${{ needs.publish-core.outputs.version }}
        env:
          GH_TOKEN: ${{ secrets.WIREMOCK_GITHUB_TOKEN }}

  trigger-docker-release:
    needs: publish-core
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Docker beta release
        run: |
          gh workflow run release-4.x-beta \
            --repo wiremock/wiremock-docker \
            -f image_version=1 \
            -f wiremock_version=${{ needs.publish-core.outputs.version }}
        env:
          GH_TOKEN: ${{ secrets.WIREMOCK_GITHUB_TOKEN }}
