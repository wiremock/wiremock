name: Publish Branch Snapshots

on:
  workflow_dispatch:

jobs:
  publish-branch-snapshot:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: true

      - name: Compute branch snapshot version
        id: version
        run: |
          BASE_VERSION=$(git describe --tags --abbrev=0 --match='[0-9]*' 2>/dev/null | sed 's/^v//' || echo "0.0.0")
          BRANCH_SLUG=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9._-]/-/g')
          echo "snapshot_version=${BASE_VERSION}-${BRANCH_SLUG}-SNAPSHOT" >> "$GITHUB_OUTPUT"

      - name: Publish to GitHub Packages
        run: ./gradlew publishMavenJavaPublicationToGitHubPackagesRepository --stacktrace -PreleaseVersion=${{ steps.version.outputs.snapshot_version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
