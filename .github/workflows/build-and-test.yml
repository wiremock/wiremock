# This workflow will build a Java project with Gradle
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-gradle

name: Build and test

on:
  push:
    branches: [ master, v4.x ]
  pull_request:
    branches: [ master, v4.x ]
  workflow_dispatch:

jobs:
  core:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        jdk: [17]
    runs-on: ${{ matrix.os }}
    env:
      JDK_VERSION:  ${{ matrix.jdk }}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.jdk }}
        distribution: 'temurin'
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        validate-wrappers: true
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Cache SonarCloud packages
      uses: actions/cache@v4
      with:
        path: ~/.sonar/cache
        key: ${{ runner.os }}-sonar
        restore-keys: ${{ runner.os }}-sonar

    - name: Test WireMock with Sonarqube
      if: ${{ matrix.os == 'ubuntu-latest' && matrix.jdk == 17 && github.event_name == 'push' }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Needed to get PR information, if any
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: ./gradlew :check :sonarqube --stacktrace --no-daemon

    - name: Test WireMock
      run: ./gradlew :check --stacktrace --no-daemon

    - name: Build standalone JAR
      run: ./gradlew :wiremock-standalone:shadowJar --no-daemon

    - name: Verify standalone JAR starts
      shell: bash
      run: |
        STANDALONE_JAR=$(ls wiremock-standalone/build/libs/wiremock-standalone-*.jar | grep -v '\-sources\.jar' | grep -v '\-javadoc\.jar' | grep -v '\-test-fixtures\.jar' | head -1)
        java -jar "$STANDALONE_JAR" --port 0 --disable-banner > wiremock-output.txt 2>&1 &
        WIREMOCK_PID=$!
        for i in $(seq 1 30); do
          if grep -q "^port:" wiremock-output.txt 2>/dev/null; then
            break
          fi
          if ! kill -0 $WIREMOCK_PID 2>/dev/null; then
            echo "WireMock process exited unexpectedly:"
            cat wiremock-output.txt
            exit 1
          fi
          sleep 1
        done
        WIREMOCK_PORT=$(grep "^port:" wiremock-output.txt | awk '{print $2}')
        if [ -z "$WIREMOCK_PORT" ]; then
          echo "Could not determine WireMock port. Output:"
          cat wiremock-output.txt
          kill $WIREMOCK_PID 2>/dev/null || true
          exit 1
        fi
        echo "WireMock started on port $WIREMOCK_PORT"
        HTTP_STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:$WIREMOCK_PORT/__admin/)
        kill $WIREMOCK_PID 2>/dev/null || true
        wait $WIREMOCK_PID 2>/dev/null || true
        if [ "$HTTP_STATUS" != "200" ]; then
          echo "Expected HTTP 200 from admin API but got $HTTP_STATUS"
          exit 1
        fi
        echo "Standalone JAR verified successfully"

    - name: Archive WireMock reports - ${{ matrix.os }} JDK ${{ matrix.jdk }}
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: wiremock-core-test-report-${{ matrix.os }} JDK ${{ matrix.jdk }}
        path: |
          build/reports/tests/test
          build/test-results/test
          build/reports/dependency-analysis/build-health-report.txt
